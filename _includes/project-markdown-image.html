<div class="project-markdown-image">
    <picture>
        <source type="image/webp" src="{% assign webp_source = include.source | replace: '.jpg', '.webp' | replace: '.png', '.webp' | replace: '.jpeg', '.webp' %}{{ webp_source }}">
        <img src="{{ include.source }}" alt="{{ include.description }}" loading="lazy" />
    </picture>
</div>
